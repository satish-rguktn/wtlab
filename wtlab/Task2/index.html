<!DOCTYPE html>
<html>
<head>
<title>Satish Shop | E-Commerce</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Arial;background:#f0f2f5;color:#333;}

/* NAVBAR */
header{
background:linear-gradient(135deg,#1a1a2e,#0f3460);
padding:0 50px;
display:flex;
align-items:center;
justify-content:space-between;
height:70px;
position:sticky;top:0;z-index:100;
}
.logo{display:flex;gap:10px;align-items:center;}
.logo h1{color:#38ef7d;}
nav a{color:white;text-decoration:none;margin:0 8px;}
.btn-login{background:#e94560;padding:6px 12px;border-radius:20px;}

.search-bar{
background:rgba(255,255,255,0.1);
padding:5px 10px;border-radius:20px;
}
.search-bar input{
background:none;border:none;color:white;outline:none;
}

/* HERO */
.hero{
padding:60px;
background:linear-gradient(135deg,#1a1a2e,#e94560);
color:white;
}
.btn-shop{background:#38ef7d;padding:10px 20px;border-radius:20px;text-decoration:none;}

/* CATEGORY */
.categories{padding:40px;background:white;}
.category-grid{display:flex;gap:15px;flex-wrap:wrap;}
.category-card{
padding:20px;background:#eee;border-radius:10px;cursor:pointer;
}

/* PRODUCTS */
.products{padding:40px;}
.product-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}
.card{
background:white;border-radius:10px;padding:15px;
position:relative;transition:0.3s;
}
.card-img{font-size:60px;text-align:center;}
.btn-cart{
background:#1a1a2e;color:white;padding:8px;width:100%;
border:none;border-radius:8px;cursor:pointer;
}
.wishlist{
position:absolute;top:10px;right:10px;
border:none;border-radius:50%;padding:5px;
cursor:pointer;
}

/* EFFECTS */
.wishlist.active{
background:#e94560;color:white;
}
.category-card.selected{
background:#38ef7d;
}
</style>
</head>

<body>

<header>
<div class="logo"><h1>SatishShop</h1></div>

<div class="search-bar">
<input type="text" placeholder="Search products...">
</div>

<nav>
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">🛒 Cart (0)</a>
<a href="#" class="btn-login">Login</a>
</nav>
</header>

<section class="hero">
<h2>Shop Smarter, Live Better</h2>
<a href="#" class="btn-shop">Shop Now</a>
</section>

<section class="categories">
<h2>Categories</h2>
<div class="category-grid">
<div class="category-card">📱 Mobiles</div>
<div class="category-card">👟 Footwear</div>
<div class="category-card">🎧 Electronics</div>
<div class="category-card">⌚ Watches</div>
</div>
</section>

<section class="products">
<h2>Products</h2>

<div class="product-grid">

<div class="card">
<button class="wishlist">🤍</button>
<div class="card-img">🎧</div>
<h3>Headphones</h3>
<button class="btn-cart">Add to Cart</button>
</div>

<div class="card">
<button class="wishlist">🤍</button>
<div class="card-img">⌚</div>
<h3>Smart Watch</h3>
<button class="btn-cart">Add to Cart</button>
</div>

<div class="card">
<button class="wishlist">🤍</button>
<div class="card-img">👟</div>
<h3>Shoes</h3>
<button class="btn-cart">Add to Cart</button>
</div>

<div class="card">
<button class="wishlist">🤍</button>
<div class="card-img">📱</div>
<h3>iPhone</h3>
<button class="btn-cart">Add to Cart</button>
</div>

</div>
</section>

<!-- jQuery CDN -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
$(document).ready(function(){

// Add to Cart
let count = 0;
$(".btn-cart").click(function(){
    let product = $(this).siblings("h3").text();
    alert(product + " added to cart!");

    count++;
    $("nav a:contains('Cart')").text("🛒 Cart ("+count+")");
});

// Wishlist
$(".wishlist").click(function(){
    $(this).toggleClass("active");

    if($(this).hasClass("active")){
        $(this).text("❤️");
    }else{
        $(this).text("🤍");
    }
});

// Search
$(".search-bar input").keyup(function(){
    let value = $(this).val().toLowerCase();

    $(".card").filter(function(){
        $(this).toggle(
            $(this).find("h3").text().toLowerCase().indexOf(value) > -1
        );
    });
});

// Category click
$(".category-card").click(function(){
    $(".category-card").removeClass("selected");
    $(this).addClass("selected");

    alert("Selected: " + $(this).text());
});

// Smooth scroll
$(".btn-shop").click(function(e){
    e.preventDefault();

    $('html, body').animate({
        scrollTop: $(".products").offset().top
    },800);
});

// Hover animation
$(".card").hover(
function(){ $(this).css("transform","scale(1.05)"); },
function(){ $(this).css("transform","scale(1)"); }
);

});
</script>

</body>
</html>
